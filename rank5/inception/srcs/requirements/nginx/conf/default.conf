server {
    # Listen on port 443 with SSL/TLS
    listen ${WP_PORT} ssl;
    listen [::]:${WP_PORT} ssl;

    # Server name from environment variable
    server_name ${DOMAIN_NAME};

    # SSL/TLS Configuration - Only TLSv1.2 and TLSv1.3
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Root directory for WordPress
    root /var/www/html;
    index index.php index.html index.htm;

    # Access and error logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Location block for WordPress
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM configuration - proxy to WordPress container
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
